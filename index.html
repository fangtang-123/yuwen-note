<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器 - 智能爬虫版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #667eea;
        }
        
        .input-group button {
            padding: 15px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .input-group button:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: none;
        }
        
        .result-header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-header h2 {
            color: #333;
        }
        
        .copy-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .note-content {
            padding: 30px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: inherit;
        }
        
        .error-card {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .examples {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .examples p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            padding: 5px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .status-badge {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ 语文笔记生成器</h1>
            <p>智能爬虫版 · 自动从网络收集资料</p>
        </header>
        
        <div class="search-card">
            <div class="input-group">
                <input type="text" id="lessonName" placeholder="例如：海底世界、桂林山水、草船借箭..." />
                <button onclick="generateNote()">🚀 开始爬取并生成笔记</button>
            </div>
            
            <div class="examples">
                <p>📖 试试这些课文：</p>
                <div class="example-buttons">
                    <span class="example-btn" onclick="setLesson('海底世界')">海底世界</span>
                    <span class="example-btn" onclick="setLesson('桂林山水')">桂林山水</span>
                    <span class="example-btn" onclick="setLesson('匆匆')">匆匆</span>
                    <span class="example-btn" onclick="setLesson('静夜思')">静夜思</span>
                    <span class="example-btn" onclick="setLesson('背影')">背影</span>
                </div>
            </div>
            
            <div class="status-badge" id="statusBadge">
                💡 提示：点击按钮后，系统会自动爬取网络资料，大约需要30-60秒
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>🕷️ 正在爬取网络资料...</p>
            <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">正在搜索：百度、初三网、语文迷</p>
            <p style="font-size: 0.8rem; color: #999; margin-top: 5px;">⏱️ 预计需要 30-60 秒，请耐心等待</p>
        </div>
        
        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h2>📖 生成结果</h2>
                <button class="copy-btn" onclick="copyNote()">📋 复制笔记</button>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>
        
        <div id="errorCard" class="error-card"></div>
    </div>

    <script>
        // GitHub 仓库配置
        const REPO_OWNER = "finnlove";
        const REPO_NAME = "yuwen-note";
        
        // 本地缓存的笔记（备用）
        const localNotes = {
            "海底世界": `# 🌊 探秘海底世界 · 学霸综合笔记

> 一份集**知识点、课堂笔记、教学思路**于一体的超实用手册！

---

## 📚 一、课文简介

《海底世界》是一篇科普性说明文，介绍了海底景色奇异、物产丰富的特点。

*   **核心问题**：大海深处是怎样的？
*   **主要内容**：从环境、动物、植物、矿产四个方面介绍。
*   **中心句**：海底真是个景色奇异、物产丰富的世界！

---

## 🧱 二、文章结构

| 部分 | 内容 |
|------|------|
| 开头 | 提出问题 |
| 中间 | 分别介绍环境、动物、植物、矿藏 |
| 结尾 | 总结全文 |

---

## ✨ 三、写作手法

1. **对比**：海面波涛澎湃 vs 海底宁静
2. **拟人**："窃窃私语"、"免费的长途旅行"
3. **列数字**：海参每小时四米，梭子鱼每小时几十千米

---

## 📝 四、词语积累

| 类别 | 词语 |
|------|------|
| 必会词 | 宁静、器官、危险、迅速、后退 |
| 近义词 | 宁静—安静、迅速—快速 |
| 反义词 | 宁静—热闹、危险—安全 |

---

## 🎯 五、课后练习

1. 有感情地朗读课文
2. 向家人介绍海底世界
3. 用"总分总"结构写一段话`,
            
            "桂林山水": `# 🏔️ 桂林山水 · 学霸笔记

> "桂林山水甲天下"

---

## 📚 一、课文内容

### 漓江的水
- **静**：感觉不到它在流动
- **清**：可以看见江底的沙石
- **绿**：仿佛一块无瑕的翡翠

### 桂林的山
- **奇**：形态万千
- **秀**：像翠绿的屏障
- **险**：危峰兀立

---

## ✨ 二、写作特色

1. **排比句**："漓江的水真静啊...真清啊...真绿啊..."
2. **比喻**：把山比作老人、巨象、骆驼
3. **首尾呼应**：开头结尾都提到"人在画中游"

---

## 🎯 三、课后练习

1. 背诵全文
2. 用"真...啊"写排比句
3. 画一画桂林山水`
        };
        
        function setLesson(lessonName) {
            document.getElementById('lessonName').value = lessonName;
            generateNote();
        }
        
        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            
            if (!lessonName) {
                alert('请输入课文名称！');
                return;
            }
            
            // 显示加载
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            
            // 更新状态提示
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = '🔄 正在触发爬虫任务，请稍后...';
            
            try {
                // 先尝试获取已有的笔记（如果之前爬取过）
                const existingNote = await tryGetExistingNote(lessonName);
                if (existingNote) {
                    displayNote(existingNote);
                    badge.innerHTML = '✅ 笔记已从缓存加载！如需最新资料，请再次点击生成。';
                    return;
                }
                
                // 触发 GitHub Actions 爬虫
                const triggered = await triggerWorkflow(lessonName);
                
                if (!triggered) {
                    // 如果触发失败，使用本地备用笔记
                    throw new Error('触发爬虫失败');
                }
                
                badge.innerHTML = '🕷️ 爬虫已启动，正在搜索网络资料...';
                
                // 轮询等待结果
                const note = await pollForResult(lessonName);
                
                if (note) {
                    displayNote(note);
                    badge.innerHTML = '✅ 笔记生成成功！数据来自网络爬虫。';
                } else {
                    throw new Error('未获取到结果');
                }
                
            } catch (error) {
                console.error('Error:', error);
                
                // 使用本地备用笔记
                const localNote = localNotes[lessonName];
                if (localNote) {
                    displayNote(localNote);
                    document.getElementById('errorCard').innerHTML = `⚠️ 爬虫暂时无法运行，已显示本地缓存笔记。<br><br>提示：需要配置 GitHub Token 才能使用爬虫功能。`;
                    document.getElementById('errorCard').style.display = 'block';
                    badge.innerHTML = '💡 当前使用本地笔记，配置 Token 后可启用网络爬虫。';
                } else {
                    document.getElementById('errorCard').innerHTML = `❌ 生成失败：${error.message}<br><br>请检查网络连接后重试。`;
                    document.getElementById('errorCard').style.display = 'block';
                    badge.innerHTML = '❌ 生成失败，请稍后重试。';
                }
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        async function tryGetExistingNote(lessonName) {
            // 尝试从 data 文件夹获取已生成的笔记
            try {
                const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/data/${encodeURIComponent(lessonName)}.md`;
                const response = await fetch(url);
                if (response.ok) {
                    return await response.text();
                }
            } catch (e) {
                // 文件不存在
            }
            return null;
        }
        
        async function triggerWorkflow(lessonName) {
            // 注意：这个功能需要 GitHub Token
            // 如果没有配置 Token，会返回 false，自动使用本地笔记
            
            const token = getGitHubToken();
            if (!token) {
                console.log('未配置 GitHub Token，使用本地笔记');
                return false;
            }
            
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            lesson_name: lessonName
                        }
                    })
                });
                
                return response.ok;
            } catch (e) {
                console.error('触发失败:', e);
                return false;
            }
        }
        
        async function pollForResult(lessonName, maxAttempts = 20, interval = 3000) {
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, interval));
                
                // 更新进度
                const badge = document.getElementById('statusBadge');
                badge.innerHTML = `🕷️ 爬虫运行中... (${i+1}/${maxAttempts}) 正在收集资料`;
                
                try {
                    const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/data/${encodeURIComponent(lessonName)}.md`;
                    const response = await fetch(url);
                    if (response.ok) {
                        return await response.text();
                    }
                } catch (e) {
                    // 继续等待
                }
            }
            return null;
        }
        
        function displayNote(note) {
            // 简单处理 Markdown 换行
            let html = note
                .replace(/\n/g, '<br>')
                .replace(/^# (.*$)/gm, '<h1 style="font-size: 1.8rem; margin: 20px 0 10px; color: #333;">$1</h1>')
                .replace(/^## (.*$)/gm, '<h2 style="font-size: 1.4rem; margin: 15px 0 10px; color: #555;">$1</h2>')
                .replace(/^### (.*$)/gm, '<h3 style="font-size: 1.2rem; margin: 12px 0 8px; color: #667eea;">$1</h3>')
                .replace(/^---$/gm, '<hr style="margin: 20px 0;">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^> (.*$)/gm, '<blockquote style="border-left: 4px solid #667eea; padding-left: 15px; margin: 10px 0; color: #666;">$1</blockquote>');
            
            // 简单处理表格
            html = html.replace(/\|(.+)\|/g, function(match) {
                return '<div style="display: flex; gap: 10px;">' + match.split('|').filter(x => x.trim()).map(cell => 
                    '<span style="flex: 1; padding: 5px;">' + cell.trim() + '</span>'
                ).join('') + '</div>';
            });
            
            document.getElementById('noteContent').innerHTML = html;
            document.getElementById('resultCard').style.display = 'block';
        }
        
        function copyNote() {
            const noteContent = document.getElementById('noteContent').innerText;
            navigator.clipboard.writeText(noteContent).then(() => {
                alert('✅ 笔记已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，可以手动选中文字复制');
            });
        }
        
        function getGitHubToken() {
            // 尝试从 localStorage 读取 token（用户可以自己配置）
            return localStorage.getItem('github_token') || null;
        }
        
        // 配置 Token 的辅助函数（可选）
        function configureToken() {
            const token = prompt('请输入你的 GitHub Personal Access Token：\n（需要 repo 和 workflow 权限）');
            if (token) {
                localStorage.setItem('github_token', token);
                alert('Token 已保存！现在可以使用爬虫功能了。');
            }
        }
        
        // 按回车键生成
        document.getElementById('lessonName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateNote();
            }
        });
        
        // 页面加载时显示提示
        console.log('📚 语文笔记生成器已加载');
        console.log('💡 配置 Token 后可使用网络爬虫功能');
    </script>
</body>
</html>
